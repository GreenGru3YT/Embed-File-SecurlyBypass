<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowProxy | Stealth Browser</title>
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-panel: #1a1a1a;
            --accent: #3b82f6;
            --text-main: #e5e7eb;
            --text-dim: #9ca3af;
            --border: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* --- Header & Navigation --- */
        #browser-header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            z-index: 100;
        }

        .nav-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        #urlBox {
            flex: 1;
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #000;
            color: var(--accent);
            outline: none;
            font-size: 14px;
            transition: border 0.2s;
        }

        #urlBox:focus {
            border-color: var(--accent);
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: var(--bg-dark);
            color: var(--text-main);
            font-weight: 500;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* --- Tab System --- */
        #tabs-container {
            display: flex;
            gap: 4px;
            padding: 8px 20px 0 20px;
            background: var(--bg-panel);
            overflow-x: auto;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: #252525;
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            min-width: 120px;
            max-width: 200px;
            font-size: 13px;
            color: var(--text-dim);
            transition: 0.2s;
        }

        .tab.activeTab {
            background: var(--bg-dark);
            color: var(--text-main);
            border-color: var(--border);
            border-bottom: 2px solid var(--accent);
        }

        .tab-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .close-tab {
            font-size: 16px;
            line-height: 1;
            opacity: 0.5;
        }

        .close-tab:hover {
            opacity: 1;
            color: #ef4444;
        }

        /* --- Content Area --- */
        #frames-viewport {
            flex: 1;
            background: white; /* Some sites need white bg to render correctly */
            position: relative;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        iframe.active {
            display: block;
        }

        /* Custom Scrollbar for Dark Mode */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
</head>
<body>

<div id="browser-header">
    <div class="nav-controls">
        <input id="urlBox" type="text" placeholder="https://google.com">
        <button class="btn-primary" onclick="openSite()">Go</button>
        <button onclick="createNewTab()">+</button>
        <button onclick="downloadCurrentPage()">Download</button>
    </div>
</div>

<div id="tabs-container"></div>
<div id="frames-viewport"></div>

<script>
    const proxies = [
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?",
        "https://thingproxy.freeboard.io/fetch/"
    ];

    let tabCount = 0;
    let activeTabId = null;

    function getProxy() {
        return proxies[Math.floor(Math.random() * proxies.length)];
    }

    function createNewTab() {
        tabCount++;
        const id = `tab-${tabCount}`;
        
        // Create Tab Element
        const tab = document.createElement("div");
        tab.className = "tab";
        tab.id = `nav-${id}`;
        tab.innerHTML = `
            <span class="tab-title">New Tab</span>
            <span class="close-tab" onclick="closeTab(event, '${id}')">×</span>
        `;
        tab.onclick = () => switchTab(id);

        // Create Frame Element
        const frame = document.createElement("iframe");
        frame.id = id;

        document.getElementById("tabs-container").appendChild(tab);
        document.getElementById("frames-viewport").appendChild(frame);

        switchTab(id);
        return { tab, frame };
    }

    function switchTab(id) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("activeTab"));
        document.querySelectorAll("iframe").forEach(f => f.classList.remove("active"));

        document.getElementById(`nav-${id}`).classList.add("activeTab");
        document.getElementById(id).classList.add("active");
        
        activeTabId = id;
    }

    function closeTab(e, id) {
        e.stopPropagation();
        const tab = document.getElementById(`nav-${id}`);
        const frame = document.getElementById(id);
        
        tab.remove();
        frame.remove();

        // If we closed the active tab, switch to the last remaining one
        if (activeTabId === id) {
            const remainingTabs = document.querySelectorAll(".tab");
            if (remainingTabs.length > 0) {
                const lastTabId = remainingTabs[remainingTabs.length - 1].id.replace('nav-', '');
                switchTab(lastTabId);
            } else {
                createNewTab();
            }
        }
    }

    function openSite() {
        let url = document.getElementById("urlBox").value.trim();
        if (!url) return;

        if (!url.startsWith("http")) {
            url = "https://" + url;
        }

        const activeFrame = document.getElementById(activeTabId);
        const activeTabNav = document.getElementById(`nav-${activeTabId}`).querySelector('.tab-title');
        
        // Update UI
        activeTabNav.innerText = url.replace('https://', '').replace('www.', '');
        activeFrame.src = getProxy() + encodeURIComponent(url);
    }

    async function downloadCurrentPage() {
        const url = document.getElementById("urlBox").value.trim();
        if (!url) return alert("Enter a URL first");

        try {
            const res = await fetch(getProxy() + encodeURIComponent(url));
            const text = await res.text();
            const blob = new Blob([text], { type: "text/html" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "captured_page.html";
            a.click();
        } catch (err) {
            alert("Download failed: " + err.message);
        }
    }

    // Key listener
    document.getElementById("urlBox").addEventListener("keypress", e => {
        if (e.key === "Enter") openSite();
    });

    // Initialize first tab
    createNewTab();
</script>

</body>
</html>
