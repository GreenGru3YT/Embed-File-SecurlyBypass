<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowProxy | Stealth Browser</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-panel: #141414;
            --accent: #3b82f6;
            --text-main: #f3f4f6;
            --text-dim: #6b7280;
            --border: #262626;
            --input-bg: #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* --- Header & Navigation --- */
        #browser-header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 8px 15px;
            z-index: 100;
        }

        .nav-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            max-width: 1600px;
            margin: 0 auto;
        }

        #urlBox {
            flex: 1;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--accent);
            outline: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        #urlBox:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }

        select, button {
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-panel);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #1f1f1f; border-color: var(--text-dim); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
        .btn-primary:hover { background: #2563eb; }

        /* --- Tab System --- */
        #tabs-container {
            display: flex;
            gap: 2px;
            padding: 5px 15px 0 15px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            min-width: 100px;
            max-width: 180px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .tab.activeTab {
            background: var(--bg-dark);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-bottom: 1px solid var(--bg-dark);
            margin-bottom: -1px;
        }

        .tab-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .close-tab { font-size: 14px; opacity: 0.4; }
        .close-tab:hover { opacity: 1; color: #f87171; }

        /* --- Viewport --- */
        #frames-viewport { flex: 1; position: relative; background: #fff; }
        iframe { position: absolute; width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>

<div id="browser-header">
    <div class="nav-controls">
        <select id="proxySelect">
            <option value="https://api.allorigins.win/raw?url=">Proxy 1 (Stable)</option>
            <option value="https://corsproxy.io/?">Proxy 2 (Fast)</option>
            <option value="https://api.codetabs.com/v1/proxy?quest=">Proxy 3 (Fallback)</option>
        </select>
        <input id="urlBox" type="text" placeholder="Search Google or enter URL...">
        <button class="btn-primary" onclick="handleNavigation()">Go</button>
        <button onclick="createNewTab()" title="New Tab">+</button>
        <button onclick="downloadCurrentPage()">Save Page</button>
    </div>
</div>

<div id="tabs-container"></div>
<div id="frames-viewport"></div>

<script>
    let tabCount = 0;
    let activeTabId = null;

    function getSelectedProxy() {
        return document.getElementById("proxySelect").value;
    }

    function createNewTab() {
        tabCount++;
        const id = `tab-${tabCount}`;
        
        // Tab UI
        const tab = document.createElement("div");
        tab.className = "tab";
        tab.id = `nav-${id}`;
        tab.innerHTML = `
            <span class="tab-title">New Tab</span>
            <span class="close-tab" onclick="closeTab(event, '${id}')">×</span>
        `;
        tab.onclick = () => switchTab(id);

        // Frame UI
        const frame = document.createElement("iframe");
        frame.id = id;
        frame.src = "about:blank";

        document.getElementById("tabs-container").appendChild(tab);
        document.getElementById("frames-viewport").appendChild(frame);

        switchTab(id);
    }

    function switchTab(id) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("activeTab"));
        document.querySelectorAll("iframe").forEach(f => f.classList.remove("active"));

        const targetTab = document.getElementById(`nav-${id}`);
        const targetFrame = document.getElementById(id);
        
        if(targetTab && targetFrame) {
            targetTab.classList.add("activeTab");
            targetFrame.classList.add("active");
            activeTabId = id;
            
            // Sync URL box with frame's current context (if possible)
            // Note: Limited due to cross-origin security
        }
    }

    function closeTab(e, id) {
        e.stopPropagation();
        document.getElementById(`nav-${id}`).remove();
        document.getElementById(id).remove();

        if (activeTabId === id) {
            const remaining = document.querySelectorAll(".tab");
            if (remaining.length > 0) {
                switchTab(remaining[remaining.length - 1].id.replace('nav-', ''));
            } else {
                createNewTab();
            }
        }
    }

    function handleNavigation() {
        let input = document.getElementById("urlBox").value.trim();
        if (!input) return;

        let finalUrl = "";

        // Logic to determine if it's a URL or a Search query
        const isUrl = /^(https?:\/\/)?([\w\d-]+\.)+[\w-]+(\/.*)?$/i.test(input) || input.includes("localhost") || input.includes(":");

        if (isUrl) {
            finalUrl = input.startsWith("http") ? input : "https://" + input;
        } else {
            // It's a search term!
            finalUrl = "https://www.google.com/search?q=" + encodeURIComponent(input);
        }

        const activeFrame = document.getElementById(activeTabId);
        const activeTabNav = document.getElementById(`nav-${activeTabId}`).querySelector('.tab-title');
        
        // Update Tab Name
        activeTabNav.innerText = isUrl ? input.replace(/https?:\/\//, '') : "Search: " + input;
        
        // Load through Proxy
        activeFrame.src = getSelectedProxy() + encodeURIComponent(finalUrl);
    }

    async function downloadCurrentPage() {
        // We use the proxy to fetch the data so we don't get blocked by CORS
        const activeFrame = document.getElementById(activeTabId);
        if(!activeFrame.src || activeFrame.src === "about:blank") return alert("No page loaded");

        try {
            const res = await fetch(activeFrame.src);
            const text = await res.text();
            const blob = new Blob([text], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "shadow_capture.html";
            a.click();
        } catch (e) {
            alert("Could not save page. The proxy might be blocking direct downloads.");
        }
    }

    // Enter Key Support
    document.getElementById("urlBox").addEventListener("keypress", e => {
        if (e.key === "Enter") handleNavigation();
    });

    // Start with one tab
    createNewTab();
</script>

</body>
</html>
