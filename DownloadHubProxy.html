<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
overflow:hidden;
}

/* Glass top bar */

#topbar{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
width:85%;
display:flex;
gap:10px;
padding:12px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:16px;
border:1px solid rgba(255,255,255,0.15);

box-shadow:0 10px 25px rgba(0,0,0,0.3);
z-index:10;
}

/* Input */

#urlBox{
flex:1;
padding:12px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.15);
color:white;
font-size:14px;
}

#urlBox::placeholder{
color:rgba(255,255,255,0.6);
}

/* Buttons */

button{
padding:12px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;

background:rgba(255,255,255,0.15);
color:white;

transition:0.25s;
}

button:hover{
background:rgba(255,255,255,0.25);
transform:scale(1.05);
}

/* Iframe */

iframe{
position:absolute;
top:0;
left:0;
width:100vw;
height:100vh;
border:none;
}
</style>
</head>

<body>

<div id="topbar">
<input id="urlBox" placeholder="Enter website URL...">
<button onclick="loadSite()">Open</button>
<button onclick="downloadSite()">Download HTML</button>
</div>

<iframe id="viewer"></iframe>

<script>

const proxy = "https://api.allorigins.win/raw?url=";

function loadSite(){

let url = document.getElementById("urlBox").value;

if(!url.startsWith("http")){
url="https://"+url;
}

document.getElementById("viewer").src = proxy + encodeURIComponent(url);

}

async function downloadSite(){

let url = document.getElementById("urlBox").value;

if(!url.startsWith("http")){
url="https://"+url;
}

try{

const res = await fetch(proxy + encodeURIComponent(url));
const text = await res.text();

const blob = new Blob([text],{type:"text/html"});

const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="downloaded_page.html";
a.click();

}

catch(e){

alert("Download failed. Site may block proxy.");

}

}

/* Press Enter to load */

document.getElementById("urlBox").addEventListener("keypress",function(e){

if(e.key==="Enter"){
loadSite();
}

});

</script>

</body>
</html>
