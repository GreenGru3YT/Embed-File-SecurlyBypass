<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Proxy Browser</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
overflow:hidden;
color:white;
}

/* TOP BAR */

#topbar{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
width:85%;

display:flex;
gap:10px;
padding:12px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);

border-radius:14px;
border:1px solid rgba(255,255,255,0.15);

z-index:20;
}

/* INPUT */

#urlBox{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.15);
color:white;
outline:none;
}

#urlBox::placeholder{
color:rgba(255,255,255,0.6);
}

/* BUTTONS */

button{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;

background:rgba(255,255,255,0.15);
color:white;

transition:.2s;
}

button:hover{
background:rgba(255,255,255,0.3);
transform:scale(1.05);
}

/* TAB BAR */

#tabs{
position:fixed;
top:80px;
left:20px;
display:flex;
gap:8px;
z-index:15;
}

/* TAB */

.tab{
display:flex;
align-items:center;
gap:8px;

padding:8px 14px;
border-radius:8px;

background:rgba(255,255,255,0.15);
cursor:pointer;

transition:.2s;
}

.tab:hover{
background:rgba(255,255,255,0.25);
}

.activeTab{
background:#4CAF50;
}

/* CLOSE BUTTON */

.close{
font-weight:bold;
cursor:pointer;
opacity:.7;
}

.close:hover{
opacity:1;
}

/* FRAME AREA */

#frames{
position:absolute;
top:120px;
left:0;
width:100%;
height:calc(100% - 120px);
}

/* IFRAMES */

iframe{
width:100%;
height:100%;
border:none;
display:none;
}

iframe.active{
display:block;
}

</style>

</head>

<body>

<div id="topbar">

<input id="urlBox" placeholder="Enter URL...">

<button onclick="openSite()">Open</button> <button onclick="createTab()">New Tab</button> <button onclick="downloadSite()">Download</button>

</div>

<div id="tabs"></div>
<div id="frames"></div>

<script>

/* Proxy list */

const proxies=[
"https://api.allorigins.win/raw?url=",
"https://cors.isomorphic-git.org/",
"https://thingproxy.freeboard.io/fetch/",
"https://yacdn.org/proxy/"
];

function getProxy(){
return proxies[Math.floor(Math.random()*proxies.length)];
}

/* Tab system */

let tabID=0;
let activeFrame=null;

function createTab(){

tabID++;

let tab=document.createElement("div");
tab.className="tab";

let title=document.createElement("span");
title.innerText="Tab "+tabID;

let close=document.createElement("span");
close.innerText="×";
close.className="close";

let frame=document.createElement("iframe");

close.onclick=(e)=>{
e.stopPropagation();
tab.remove();
frame.remove();
};

tab.appendChild(title);
tab.appendChild(close);

tab.onclick=()=>activateTab(tab,frame);

document.getElementById("tabs").appendChild(tab);
document.getElementById("frames").appendChild(frame);

activateTab(tab,frame);

}

function activateTab(tab,frame){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("activeTab"));
document.querySelectorAll("#frames iframe").forEach(f=>f.classList.remove("active"));

tab.classList.add("activeTab");
frame.classList.add("active");

activeFrame=frame;

}

/* Open website */

function openSite(){

let url=document.getElementById("urlBox").value;

if(!url.startsWith("http")){
url="https://"+url;
}

let proxy=getProxy();

if(!activeFrame){
createTab();
}

activeFrame.src=proxy+encodeURIComponent(url);

}

/* Download HTML */

async function downloadSite(){

let url=document.getElementById("urlBox").value;

if(!url.startsWith("http")){
url="https://"+url;
}

let proxy=getProxy();

try{

let res=await fetch(proxy+encodeURIComponent(url));
let text=await res.text();

let blob=new Blob([text],{type:"text/html"});

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="page.html";
a.click();

}
catch{
alert("Download failed.");
}

}

/* Enter key support */

document.getElementById("urlBox").addEventListener("keypress",e=>{
if(e.key==="Enter") openSite();
});

/* Start with one tab */

createTab();

</script>

</body>
</html>
