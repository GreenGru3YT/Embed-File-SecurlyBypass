<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowProxy | Ultra Stealth</title>
    <style>
        :root {
            --bg-dark: #080808;
            --bg-panel: #111111;
            --accent: #3b82f6;
            --text-main: #f3f4f6;
            --text-dim: #71717a;
            --border: #222222;
            --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* --- Modern Header --- */
        #browser-header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        #urlBox {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #000;
            color: var(--accent);
            outline: none;
            font-size: 14px;
        }

        #urlBox:focus { border-color: var(--accent); }

        select, button {
            padding: 9px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-panel);
            color: var(--text-main);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-primary { background: var(--accent); border-color: var(--accent); font-weight: bold; }

        /* --- Compatibility Alert --- */
        #status-bar {
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        /* --- Tabs --- */
        #tabs-container {
            display: flex;
            gap: 4px;
            padding: 5px 15px 0 15px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-dim);
            min-width: 100px;
        }

        .tab.activeTab {
            background: var(--bg-dark);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-bottom: 1px solid var(--bg-dark);
            margin-bottom: -1px;
        }

        /* --- Content Area --- */
        #frames-viewport { flex: 1; position: relative; background: #fff; }
        iframe { position: absolute; width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
    </style>
</head>
<body>

<div id="browser-header">
    <div class="nav-controls">
        <select id="proxySelect">
            <option value="https://api.allorigins.win/raw?url=">Engine A (Best for HTML)</option>
            <option value="https://corsproxy.io/?">Engine B (Fastest)</option>
            <option value="https://api.codetabs.com/v1/proxy?quest=">Engine C (Alternate)</option>
        </select>
        <input id="urlBox" type="text" placeholder="Search DuckDuckGo or paste URL...">
        <button class="btn-primary" onclick="handleNavigation()">Navigate</button>
        <button onclick="createNewTab()">+</button>
    </div>
    <div id="status-bar">
        <span><b>Tip:</b> If a site fails, try Engine B.</span>
        <span><b>Note:</b> Sites like TikTok/Discord block all proxies.</span>
    </div>
</div>

<div id="tabs-container"></div>
<div id="frames-viewport">
    <div id="loader" class="loading-overlay">
        <p>Loading through shadow tunnel...</p>
    </div>
</div>

<script>
    let tabCount = 0;
    let activeTabId = null;

    function createNewTab() {
        tabCount++;
        const id = `tab-${tabCount}`;
        const tab = document.createElement("div");
        tab.className = "tab";
        tab.id = `nav-${id}`;
        tab.innerHTML = `<span class="tab-title">New Tab</span><span onclick="closeTab(event,'${id}')" style="margin-left:8px;opacity:0.5">×</span>`;
        tab.onclick = () => switchTab(id);

        const frame = document.createElement("iframe");
        frame.id = id;
        frame.onload = () => document.getElementById('loader').style.display = 'none';

        document.getElementById("tabs-container").appendChild(tab);
        document.getElementById("frames-viewport").appendChild(frame);
        switchTab(id);
    }

    function switchTab(id) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("activeTab"));
        document.querySelectorAll("iframe").forEach(f => f.classList.remove("active"));
        document.getElementById(`nav-${id}`).classList.add("activeTab");
        document.getElementById(id).classList.add("active");
        activeTabId = id;
    }

    function closeTab(e, id) {
        e.stopPropagation();
        document.getElementById(`nav-${id}`).remove();
        document.getElementById(id).remove();
        if (activeTabId === id) {
            const tabs = document.querySelectorAll(".tab");
            if (tabs.length) switchTab(tabs[tabs.length-1].id.replace('nav-',''));
            else createNewTab();
        }
    }

    function handleNavigation() {
        const input = document.getElementById("urlBox").value.trim();
        if (!input) return;

        document.getElementById('loader').style.display = 'flex';
        
        let targetUrl = "";
        const isUrl = /^(https?:\/\/)?([\w\d-]+\.)+[\w-]+(\/.*)?$/i.test(input) && !input.includes(" ");

        if (isUrl) {
            targetUrl = input.startsWith("http") ? input : "https://" + input;
        } else {
            // FIXED DuckDuckGo Search Link (kp=-1 enables safe search fallback for better proxy loading)
            targetUrl = `https://duckduckgo.com/?q=${encodeURIComponent(input)}&kae=d`;
        }

        const proxy = document.getElementById("proxySelect").value;
        const activeFrame = document.getElementById(activeTabId);
        
        // Update Tab Label
        document.getElementById(`nav-${activeTabId}`).querySelector('.tab-title').innerText = isUrl ? input.split('/')[0] : "Search: " + input;
        
        // Force URL encoding for the proxy to prevent "Invalid Request"
        activeFrame.src = proxy + encodeURIComponent(targetUrl);
    }

    document.getElementById("urlBox").addEventListener("keypress", e => { if (e.key === "Enter") handleNavigation(); });
    createNewTab();
</script>

</body>
</html>
