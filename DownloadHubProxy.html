<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowProxy | 10+ Stealth Tunnels</title>
    <style>
        :root {
            --bg-dark: #050505;
            --bg-panel: #0f0f0f;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-main: #f9fafb;
            --text-dim: #9ca3af;
            --border: #1f2937;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--bg-dark); height: 100vh; overflow: hidden; color: var(--text-main); display: flex; flex-direction: column; }

        /* --- UI Header --- */
        header { 
            background: var(--bg-panel); 
            border-bottom: 2px solid var(--border); 
            padding: 14px 20px; 
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .nav-row { display: flex; gap: 12px; align-items: center; max-width: 1600px; margin: 0 auto; width: 100%; }
        
        #urlBox { 
            flex: 1; padding: 12px 18px; border-radius: 12px; border: 1px solid var(--border); 
            background: #000; color: var(--accent); outline: none; font-size: 14px; 
            transition: all 0.3s ease;
        }
        #urlBox:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        select, button { 
            padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border); 
            background: #18181b; color: var(--text-main); font-size: 13px; cursor: pointer; 
            transition: 0.2s; 
        }
        select:hover { background: #27272a; }
        .go-btn { background: var(--accent); border: none; font-weight: bold; color: white; padding: 10px 24px; box-shadow: 0 0 10px var(--accent-glow); }
        .go-btn:hover { background: #2563eb; transform: scale(1.05); }

        /* --- Tab System --- */
        #tabs-bar { display: flex; gap: 8px; padding: 8px 15px 0; background: var(--bg-panel); overflow-x: auto; scrollbar-width: none; }
        .tab { 
            display: flex; align-items: center; gap: 10px; padding: 12px 20px; 
            background: #111; border: 1px solid var(--border); border-bottom: none; 
            border-radius: 10px 10px 0 0; cursor: pointer; font-size: 12px; 
            color: var(--text-dim); min-width: 140px; white-space: nowrap;
        }
        .tab.activeTab { background: var(--bg-dark); color: var(--accent); border-top: 2px solid var(--accent); font-weight: 600; }
        .close-tab { font-size: 16px; margin-left: 5px; opacity: 0.4; transition: 0.2s; }
        .close-tab:hover { color: #ef4444; opacity: 1; }

        /* --- Viewport --- */
        main { flex: 1; position: relative; background: #fff; }
        iframe { position: absolute; width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
        
        .loader { 
            position: absolute; inset: 0; background: var(--bg-dark); z-index: 50; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
        }
        .pulse { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

<header>
    <div class="nav-row">
        <select id="proxySelect" title="Select Network Tunnel">
            <optgroup label="Fastest (CORS-ready)">
                <option value="https://corsproxy.io/?">🚀 CorsProxy.io (Recommended)</option>
                <option value="https://api.allorigins.win/raw?url=">⚡ AllOrigins (Direct)</option>
                <option value="https://api.codetabs.com/v1/proxy?quest=">🛡️ CodeTabs (Stealth)</option>
            </optgroup>
            <optgroup label="High Performance">
                <option value="https://proxy.cors.sh/">🌐 CORS.SH (Unlimited)</option>
                <option value="https://thingproxy.freeboard.io/fetch/">📁 ThingProxy (Lite)</option>
                <option value="https://api.proxyscrape.com/v2/?request=getproxies&protocol=http&url=">🔍 ProxyScrape (Rotating)</option>
            </optgroup>
            <optgroup label="International Tunnels">
                <option value="https://api.allorigins.win/get?url=">🌍 Global Node A</option>
                <option value="https://cors-anywhere.herokuapp.com/">🏰 Heroku Proxy (Legacy)</option>
                <option value="https://whateverorigin.org/get?url=">🌀 WhateverOrigin</option>
            </optgroup>
        </select>

        <select id="engineSelect" title="Search Engine">
            <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
            <option value="https://www.google.com/search?q=">Google</option>
            <option value="https://search.brave.com/search?q=">Brave</option>
            <option value="https://www.bing.com/search?q=">Bing</option>
            <option value="https://yandex.com/search/?text=">Yandex</option>
            <option value="https://ahmia.fi/search/?q=">Ahmia (Deep Web)</option>
        </select>

        <input id="urlBox" type="text" placeholder="Enter URL or Search...">
        <button class="go-btn" onclick="handleNavigation()">GO</button>
        <button onclick="createNewTab()" style="font-weight:bold;">+</button>
    </div>
</header>

<div id="tabs-bar"></div>
<main id="frames-viewport">
    <div id="loader" class="loader"><div class="pulse"></div><p style="margin-top:20px; color:var(--text-dim); font-size:11px; letter-spacing:2px;">ENCRYPTING TUNNEL</p></div>
</main>

<script>
    let tabCount = 0;
    let activeTabId = null;

    function createNewTab() {
        tabCount++;
        const id = `tab-${tabCount}`;
        const tab = document.createElement("div");
        tab.className = "tab";
        tab.id = `nav-${id}`;
        tab.innerHTML = `<span class="tab-title">New Tab</span><span class="close-tab" onclick="closeTab(event,'${id}')">×</span>`;
        tab.onclick = () => switchTab(id);

        const frame = document.createElement("iframe");
        frame.id = id;
        frame.onload = () => document.getElementById('loader').style.display = 'none';

        document.getElementById("tabs-bar").appendChild(tab);
        document.getElementById("frames-viewport").appendChild(frame);
        switchTab(id);
    }

    function switchTab(id) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("activeTab"));
        document.querySelectorAll("iframe").forEach(f => f.classList.remove("active"));
        const targetTab = document.getElementById(`nav-${id}`);
        if(targetTab) {
            targetTab.classList.add("activeTab");
            document.getElementById(id).classList.add("active");
            activeTabId = id;
        }
    }

    function closeTab(e, id) {
        e.stopPropagation();
        document.getElementById(`nav-${id}`).remove();
        document.getElementById(id).remove();
        if (activeTabId === id) {
            const tabs = document.querySelectorAll(".tab");
            if (tabs.length) switchTab(tabs[tabs.length-1].id.replace('nav-',''));
            else createNewTab();
        }
    }

    function handleNavigation() {
        const input = document.getElementById("urlBox").value.trim();
        if (!input) return;

        document.getElementById('loader').style.display = 'flex';
        let targetUrl = "";
        const isUrl = /^(https?:\/\/)?([\w\d-]+\.)+[\w-]+(\/.*)?$/i.test(input) && !input.includes(" ");

        if (isUrl) {
            targetUrl = input.startsWith("http") ? input : "https://" + input;
        } else {
            const engine = document.getElementById("engineSelect").value;
            targetUrl = engine + encodeURIComponent(input);
        }

        const proxy = document.getElementById("proxySelect").value;
        const activeFrame = document.getElementById(activeTabId);
        
        // Shorten title for tab
        let displayTitle = isUrl ? input.split('/')[0] : input;
        if(displayTitle.length > 15) displayTitle = displayTitle.substring(0,12) + "...";
        document.getElementById(`nav-${activeTabId}`).querySelector('.tab-title').innerText = displayTitle;
        
        activeFrame.src = proxy + encodeURIComponent(targetUrl);
    }

    document.getElementById("urlBox").addEventListener("keypress", e => { if (e.key === "Enter") handleNavigation(); });
    createNewTab();
</script>

</body>
</html>
