<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
}

/* Top UI bar */
#topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:50px;
  background:#111;
  display:flex;
  align-items:center;
  padding:0 10px;
  box-sizing:border-box;
  z-index:10;
}

#urlBox{
  flex:1;
  height:30px;
  border:none;
  padding:5px;
  border-radius:4px;
}

button{
  margin-left:10px;
  height:34px;
  padding:0 15px;
  border:none;
  border-radius:4px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#45a049;
}

iframe{
  position:absolute;
  top:50px;
  width:100vw;
  height:calc(100vh - 50px);
  border:none;
}
</style>
</head>

<body>

<div id="topbar">
  <input id="urlBox" placeholder="Enter URL here...">
  <button onclick="loadSite()">Load</button>
  <button onclick="downloadSite()">Download</button>
</div>

<iframe id="viewer" src=""></iframe>

<script>
function loadSite(){
  const url = document.getElementById("urlBox").value;
  document.getElementById("viewer").src = url;
}

async function downloadSite(){
  const url = document.getElementById("urlBox").value;

  try{
    const response = await fetch(url);
    const text = await response.text();

    const blob = new Blob([text], {type:"text/html"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "downloaded_site.html";
    a.click();
  }
  catch(e){
    alert("Download failed. The site may block requests (CORS).");
  }
}
</script>

</body>
</html>
