<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowProxy | Stealth Browser</title>
    <style>
        :root {
            --bg-dark: #090909;
            --bg-panel: #121212;
            --accent: #3b82f6; /* Modern Blue */
            --text-main: #f9fafb;
            --text-dim: #71717a;
            --border: #27272a;
            --input-bg: #000000;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            overflow: hidden;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* --- Header & Navigation --- */
        #browser-header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 10px 18px;
            z-index: 100;
        }

        .nav-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        #urlBox {
            flex: 1;
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--accent);
            outline: none;
            font-size: 14px;
            letter-spacing: 0.3px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #urlBox:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15); 
        }

        select, button {
            padding: 9px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-panel);
            color: var(--text-main);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #18181b; border-color: var(--text-dim); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }

        /* --- Tab System --- */
        #tabs-container {
            display: flex;
            gap: 4px;
            padding: 6px 18px 0 18px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            min-width: 120px;
            max-width: 220px;
            font-size: 12px;
            color: var(--text-dim);
            transition: 0.2s;
        }

        .tab:hover { color: var(--text-main); background: rgba(255,255,255,0.03); }

        .tab.activeTab {
            background: var(--bg-dark);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-bottom: 1px solid var(--bg-dark);
            margin-bottom: -1px;
        }

        .tab-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .close-tab { font-size: 16px; opacity: 0.3; transition: 0.2s; }
        .close-tab:hover { opacity: 1; color: #ef4444; }

        /* --- Viewport --- */
        #frames-viewport { flex: 1; position: relative; background: #fff; }
        iframe { position: absolute; width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<div id="browser-header">
    <div class="nav-controls">
        <select id="proxySelect" title="Switch Proxy Engine">
            <option value="https://api.allorigins.win/raw?url=">Proxy 1 (Stable)</option>
            <option value="https://corsproxy.io/?">Proxy 2 (Fast)</option>
            <option value="https://api.codetabs.com/v1/proxy?quest=">Proxy 3 (Lite)</option>
        </select>
        <input id="urlBox" type="text" placeholder="Search DuckDuckGo or enter URL...">
        <button class="btn-primary" onclick="handleNavigation()">Go</button>
        <button onclick="createNewTab()" title="New Tab">+</button>
        <button onclick="downloadCurrentPage()" title="Download Page Source">Save</button>
    </div>
</div>

<div id="tabs-container"></div>
<div id="frames-viewport"></div>

<script>
    let tabCount = 0;
    let activeTabId = null;

    function getSelectedProxy() {
        return document.getElementById("proxySelect").value;
    }

    function createNewTab() {
        tabCount++;
        const id = `tab-${tabCount}`;
        
        // Tab UI
        const tab = document.createElement("div");
        tab.className = "tab";
        tab.id = `nav-${id}`;
        tab.innerHTML = `
            <span class="tab-title">New Tab</span>
            <span class="close-tab" onclick="closeTab(event, '${id}')">×</span>
        `;
        tab.onclick = () => switchTab(id);

        // Frame UI
        const frame = document.createElement("iframe");
        frame.id = id;
        frame.src = "about:blank";

        document.getElementById("tabs-container").appendChild(tab);
        document.getElementById("frames-viewport").appendChild(frame);

        switchTab(id);
    }

    function switchTab(id) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("activeTab"));
        document.querySelectorAll("iframe").forEach(f => f.classList.remove("active"));

        const targetTab = document.getElementById(`nav-${id}`);
        const targetFrame = document.getElementById(id);
        
        if(targetTab && targetFrame) {
            targetTab.classList.add("activeTab");
            targetFrame.classList.add("active");
            activeTabId = id;
        }
    }

    function closeTab(e, id) {
        e.stopPropagation();
        document.getElementById(`nav-${id}`).remove();
        document.getElementById(id).remove();

        if (activeTabId === id) {
            const remaining = document.querySelectorAll(".tab");
            if (remaining.length > 0) {
                switchTab(remaining[remaining.length - 1].id.replace('nav-', ''));
            } else {
                createNewTab();
            }
        }
    }

    function handleNavigation() {
        let input = document.getElementById("urlBox").value.trim();
        if (!input) return;

        let finalUrl = "";
        
        // RegEx to check if input is a valid URL (contains a dot and no spaces)
        const isUrl = /^(https?:\/\/)?([\w\d-]+\.)+[\w-]+(\/.*)?$/i.test(input) && !input.includes(" ");

        if (isUrl) {
            finalUrl = input.startsWith("http") ? input : "https://" + input;
        } else {
            // Updated to DuckDuckGo Search!
            finalUrl = "https://duckduckgo.com/?q=" + encodeURIComponent(input);
        }

        const activeFrame = document.getElementById(activeTabId);
        const activeTabNav = document.getElementById(`nav-${activeTabId}`).querySelector('.tab-title');
        
        // Visual updates
        activeTabNav.innerText = isUrl ? input.replace(/https?:\/\//, '') : "DDG: " + input;
        
        // Load through Proxy
        activeFrame.src = getSelectedProxy() + encodeURIComponent(finalUrl);
    }

    async function downloadCurrentPage() {
        const activeFrame = document.getElementById(activeTabId);
        if(!activeFrame.src || activeFrame.src === "about:blank") return alert("No page loaded");

        try {
            const res = await fetch(activeFrame.src);
            const text = await res.text();
            const blob = new Blob([text], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "shadow_source.html";
            a.click();
        } catch (e) {
            alert("Security Error: This site or proxy blocks manual saving.");
        }
    }

    document.getElementById("urlBox").addEventListener("keypress", e => {
        if (e.key === "Enter") handleNavigation();
    });

    // Start
    createNewTab();
</script>

</body>
</html>
